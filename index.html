<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>WhatsNext</title>
</head>
<body>
    <div class="app">
        <header>
        </header>
        <main>
            <div id="displayColumn">

                <div id="topRow">
                    <button id="modeBtn">Ordered</button>
                    <button id="scoreBtn">---</button>
                </div>

                <p id="question">
                    <span id="firstWord">What's</span>
                    <span id="secondWord">after</span>
                    <span id="thirdWord">Genesis?</span>
                </p>

                <input
                type="text"
                id="answer"
                list="booksList"
                name="answer"
                placeholder="It is..">
                <datalist
                id="booksList"
                ></datalist>

                <button id="nextBtn">Check</button>
            </div>
        </main>
  </div>

    <script src="script.js"></script>
</body>
</html>
